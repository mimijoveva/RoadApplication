<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Состојба на патишта</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      border-radius: 10px;
      padding: 15px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      min-width: 120px;
    }

    .filters {
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      margin-right: 10px;
    }

    .reports {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 8px solid gray;
    }

    .card.red {
      border-left-color: #e53935;
    }

    .card.yellow {
      border-left-color: #fbc02d;
    }

    .card.green {
      border-left-color: #43a047;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .description {
      font-size: 15px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Состојба на патишта во Македонија</h1>

  <div class="summary" id="summary"></div>

  <div class="filters">
    <select id="severityFilter">
      <option value="">Сите severity</option>
      <option value="RED">RED</option>
      <option value="YELLOW">YELLOW</option>
      <option value="GREEN">GREEN</option>
    </select>

    <button onclick="loadReports()">Филтрирај</button>
  </div>

  <div class="reports" id="reports"></div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    async function loadSummary() {
      const res = await fetch(`${API_BASE}/summary`);
      const data = await res.json();

      document.getElementById("summary").innerHTML = `
        <div class="box">Вкупно: <strong>${data.total}</strong></div>
        <div class="box">Активни: <strong>${data.active}</strong></div>
        <div class="box">RED: <strong>${data.red}</strong></div>
        <div class="box">YELLOW: <strong>${data.yellow}</strong></div>
        <div class="box">GREEN: <strong>${data.green}</strong></div>
      `;
    }

    async function loadReports() {
      const severity = document.getElementById("severityFilter").value;
      let url = `${API_BASE}/reports`;

      if (severity) {
        url += `?severity=${severity}`;
      }

      const res = await fetch(url);
      const data = await res.json();

      const container = document.getElementById("reports");
      container.innerHTML = "";

      data.forEach(report => {
        const severityClass = report.severity.toLowerCase();

        const card = document.createElement("div");
        card.className = `card ${severityClass}`;

        card.innerHTML = `
          <div class="title">${report.title}</div>
          <div class="meta">
            Категорија: ${report.category} <br>
            Severity: ${report.severity} <br>
            Status: ${report.status_type}
          </div>
          <div class="description">${report.description}</div>
        `;

        container.appendChild(card);
      });
    }

    loadSummary();
    loadReports();
  </script>
</body>
</html>
