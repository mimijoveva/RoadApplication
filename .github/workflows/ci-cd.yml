name: CI/CD Pipeline - RoadApplication

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: mimi2005/roadmk-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./roadmk-frontend
          push: true
          tags: mimi2005/roadmk-frontend:latest

      - name: Deploy backend to Render
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d90jpevavr4c738q2lug?key=kiozwR2guaY"